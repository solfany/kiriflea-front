<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>너굴상점 이메일 템플릿 미리보기</title>
</head>

<body
  style="margin: 0; padding: 40px 20px; background-color: #f4f6f8; font-family: 'Apple SD Gothic Neo', -apple-system, sans-serif;">

  <div
    style="max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #e5e7eb;">

    <!-- 상단 배너 이미지 -->
    <div style="width: 100%; text-align: center; background: #f9fafb;">
      <img src="/images/mail/verifyCode1.jpeg" style="width: 100%; max-width: 560px; height: auto; display: block;"
        alt="너굴상점 배너" />
    </div>

    <!-- 본문 컨텐츠 -->
    <div style="padding: 36px 32px; text-align: center;">
      <h2 style="font-size: 22px; font-weight: 800; color: #111827; margin: 0 0 12px 0; letter-spacing: -0.02em;">이메일 인증
        안내 🍃</h2>
      <p style="font-size: 14.5px; color: #4b5563; margin: 0 0 28px 0; line-height: 1.6; word-break: keep-all;">
        너굴상점 가입을 환영합니다!<br />아래 6자리 인증 코드를 입력하여 회원가입을 완료해주세요.
      </p>

      <!-- 인증 코드 박스 -->
      <div
        style="background: #E8F5E9; border: 1.5px solid #C8E6C9; border-radius: 16px; padding: 22px; margin-bottom: 28px;">
        <span
          style="font-size: 12px; font-weight: 700; color: #4CAF50; letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 8px;">인증
          코드</span>
        <span
          style="font-size: 34px; font-weight: 900; color: #2E7D32; letter-spacing: 0.25em; font-family: monospace;">849201</span>
      </div>

      <p style="font-size: 12.5px; color: #9ca3af; margin: 0;">본 인증 코드는 <strong>10분간</strong> 유효합니다.</p>
    </div>

    <!-- 푸터 -->
    <div style="background: #f9fafb; padding: 18px 28px; border-top: 1px solid #f3f4f6; text-align: center;">
      <span style="font-size: 12px; color: #9ca3af;">© 너굴상점 Nook Market. All rights reserved.</span>
    </div>

  </div>

</body>

</html>
